x-airflow-common: &x-airflow-common
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/airflow_db
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
  MLFLOW_TRACKING_URI: http://mlflow:5000
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}

services:
  db:
    image: postgres:15
    container_name: churn-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER']
      interval: 5s
      retries: 5

  mlflow:
    build: docker/mlflow/
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mlflow_db
      --artifacts-destination /mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - 5000:5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mlflow-artifacts:/mlflow-artifacts
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 10s
      retries: 5
      start_period: 30s

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: >
      bash -c
      "airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname admin --lastname admin --role Admin --email admin@example.com &&
      airflow connections add postgres_default --conn-type postgres --conn-host db --conn-port 5432 --conn-login ${POSTGRES_USER} --conn-password ${POSTGRES_PASSWORD} --conn-schema ${POSTGRES_DB}"
    environment:
      <<: *x-airflow-common
    depends_on:
      db:
        condition: service_healthy

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: airflow webserver --port 8080
    ports:
      - '8080:8080'
    environment:
      <<: *x-airflow-common
    volumes:
      - ./dags:/opt/airflow/dags
      - ./churn_prediction:/opt/airflow/churn_prediction
      - ./data:/opt/airflow/data
      - ./config:/opt/airflow/config
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: airflow scheduler
    environment:
      <<: *x-airflow-common
    volumes:
      - ./dags:/opt/airflow/dags
      - ./churn_prediction:/opt/airflow/churn_prediction
      - ./data:/opt/airflow/data
      - ./config:/opt/airflow/config
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      mlflow:
        condition: service_healthy

volumes:
  db_data:
  mlflow-artifacts:
