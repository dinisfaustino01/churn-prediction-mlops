services:
  db:
    image: postgres:15
    container_name: churn-postgres
    environment:
      POSTGRES_USER: churn_user
      POSTGRES_PASSWORD: REDACTED
      POSTGRES_DB: churn_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U churn_user']
      interval: 5s
      retries: 5

  mlflow:
    build: docker/mlflow/
    command: >
      mlflow server
      --backend-store-uri postgresql://churn_user:REDACTED@db:5432/mlflow_db
      --artifacts-destination /mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - 5000:5000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mlflow-artifacts:/mlflow-artifacts
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 10s
      retries: 5
      start_period: 30s

volumes:
  db_data:
  mlflow-artifacts:
